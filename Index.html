<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>depressinator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * {
      -webkit-tap-highlight-color: transparent;
    }
    html {
      -webkit-text-size-adjust: none;
    }
    body { 
      font-family: 'Press Start 2P', system-ui; 
      touch-action: manipulation;
      overscroll-behavior: none;
    }
    .glitch {
      animation: glitch 0.3s infinite;
    }
    @keyframes glitch {
      0% { text-shadow: 3px 3px #ff0000, -3px -3px #00ffff; }
      25% { text-shadow: -3px 3px #ff0000, 3px -3px #00ffff; }
      50% { text-shadow: 3px -3px #ff0000, -3px 3px #00ffff; }
      100% { text-shadow: 3px 3px #ff0000, -3px -3px #00ffff; }
    }
    .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shake {
      10%, 90% { transform: translate3d(-4px, 0, 0); }
      20%, 80% { transform: translate3d(4px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
      40%, 60% { transform: translate3d(8px, 0, 0); }
    }
    .particle { position: absolute; pointer-events: none; font-size: 2.5rem; z-index: 9999; }
    .regret { animation: regretPulse 1s infinite alternate; }

    /* Mobile-specific fixes */
    @media (max-width: 640px) {
      h1 {
        font-size: 2.75rem;
        line-height: 1.1;
      }
      .text-7xl {
        font-size: 3.5rem;
      }
      .text-8xl {
        font-size: 4rem;
      }
      button {
        padding-left: 3rem;
        padding-right: 3rem;
        padding-top: 3rem;
        padding-bottom: 3rem;
      }
    }
  </style>
</head>
<body class="bg-black text-red-600 overflow-hidden flex items-center justify-center min-h-screen min-h-dvh">
  <div class="max-w-4xl mx-auto text-center p-6 md:p-8 relative w-full">
    <!-- TITLE -->
    <h1 class="text-5xl md:text-6xl mb-8 glitch tracking-widest">depressinator</h1>
    
    <!-- THE BUTTON -->
    <div class="flex justify-center mb-12">
      <button onclick="pressTheButton()" 
        id="doNotPressBtn"
        class="px-20 py-16 text-7xl md:text-8xl font-bold border-8 border-red-600 bg-black hover:bg-red-600 hover:text-black active:scale-95 transition-all shadow-[0_0_80px_-10px] shadow-red-600 rounded-3xl touch-manipulation">
        do not press
      </button>
    </div>

    <!-- COUNTER -->
    <div class="mb-12">
      <div id="counter" class="inline-flex items-center gap-3 bg-gray-950 border-4 border-red-600 px-8 py-4 text-3xl font-bold mx-auto">
        ruined 
        <span id="pressCount" class="text-white tabular-nums">0</span> 
        times
      </div>
    </div>

    <!-- HIDDEN REGRET RESET -->
    <div onclick="fakeReset()" 
      class="inline-flex mx-auto px-6 py-3 text-xs border border-red-900 hover:border-red-500 text-red-400 hover:text-red-300 cursor-pointer transition-colors select-none">
      i regret everything (reset)
    </div>

    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 text-[10px] text-red-900/50 tracking-widest pointer-events-none">
      the more you press the worse it gets
    </div>
  </div>

  <!-- CANVAS FOR PARTICLES -->
  <canvas id="canvas" class="fixed inset-0 pointer-events-none z-50"></canvas>

  <script>
    let pressCount = 0;
    let chaosLevel = 0;
    const counterEl = document.getElementById('pressCount');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const regretEmojis = ['💀', '😭', '🪦', '🥲', '🔥', '💥', '🌀', '🚨', '🤡', '⛔'];

    function updateCounter() {
      counterEl.textContent = pressCount;
      if (pressCount >= 20) {
        counterEl.classList.add('glitch');
        document.body.style.filter = 'invert(1) hue-rotate(180deg)';
      }
    }

    function triggerShake(intensity = 1) {
      const duration = 400 + (chaosLevel * 100);
      document.body.classList.add('shake');
      setTimeout(() => document.body.classList.remove('shake'), duration);
      
      if (chaosLevel > 5) {
        document.body.style.transform = `rotate(${Math.random() * 8 - 4}deg)`;
        setTimeout(() => { document.body.style.transform = ''; }, 300);
      }
    }

    function spawnParticles(count = 60) {
      for (let i = 0; i < count; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.textContent = regretEmojis[Math.floor(Math.random() * regretEmojis.length)];
        particle.style.left = Math.random() * window.innerWidth + 'px';
        particle.style.top = (window.innerHeight * 0.6) + 'px';
        particle.style.fontSize = (1.5 + Math.random() * 2) + 'rem';
        document.body.appendChild(particle);
        
        const xDrift = (Math.random() - 0.5) * 800;
        const duration = 1800 + Math.random() * 2200;
        
        particle.animate([
          { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
          { transform: `translate(${xDrift}px, -${window.innerHeight + 400}px) rotate(${Math.random() * 1440}deg)`, opacity: 0 }
        ], {
          duration: duration,
          easing: 'cubic-bezier(0.42, 0, 1, 1)'
        });
        
        setTimeout(() => particle.remove(), duration);
      }
    }

    function colorStrobe() {
      let hue = 0;
      const interval = setInterval(() => {
        hue = (hue + 45) % 360;
        document.documentElement.style.filter = `hue-rotate(${hue}deg) saturate(2)`;
      }, 60);
      
      setTimeout(() => {
        clearInterval(interval);
        document.documentElement.style.filter = '';
      }, 1400 + chaosLevel * 300);
    }

    function randomRegretAlert() {
      const messages = [
        "you pressed it anyway",
        "your friends are already laughing",
        "this cannot be undone",
        "regret level: critical",
        "the page now hates you",
        "everyone knows what you did",
        "chaos has been permanently upgraded",
        "you are the reason this exists",
        "there is no escape",
        "the simulation just blue-screened because of you"
      ];
      const msg = messages[Math.floor(Math.random() * messages.length)];
      alert("🚨 " + msg.toUpperCase() + " 🚨");
    }

    function fakeVirusWarning() {
      if (pressCount > 12) {
        const warnings = [
          "WARNING: REGRET VIRUS DETECTED",
          "YOUR DEVICE IS NOW CURSED",
          "FRIENDSHIP STATUS: TERMINATED",
          "THIS TAB WILL NEVER BE THE SAME",
          "YOU HAVE AWAKENED THE VOID"
        ];
        alert("☣️ " + warnings[Math.floor(Math.random() * warnings.length)] + " ☣️");
      }
    }

    function pressTheButton() {
      pressCount++;
      chaosLevel = Math.floor(pressCount / 3);
      
      updateCounter();
      triggerShake(chaosLevel);
      spawnParticles(30 + chaosLevel * 15);
      
      if (pressCount % 3 === 0) colorStrobe();
      if (pressCount % 4 === 0) randomRegretAlert();
      if (pressCount % 5 === 0) fakeVirusWarning();
      
      if (pressCount > 8) {
        const tilt = (pressCount % 2 === 0 ? 6 : -6) + chaosLevel;
        document.body.style.transition = 'transform 0.2s';
        document.body.style.transform = `rotate(${tilt}deg)`;
        setTimeout(() => {
          document.body.style.transition = 'transform 1s';
          document.body.style.transform = '';
        }, 600);
      }
      
      if (pressCount >= 10) {
        const btn = document.getElementById('doNotPressBtn');
        btn.classList.add('glitch');
        btn.style.borderColor = '#ff00ff';
      }
      
      if (pressCount === 25) {
        document.getElementById('doNotPressBtn').innerHTML = `do not press<br><span class="text-3xl">(you absolute legend)</span>`;
      }
    }

    function fakeReset() {
      pressCount += Math.floor(Math.random() * 12) + 8;
      chaosLevel += 4;
      updateCounter();
      triggerShake(3);
      spawnParticles(120);
      colorStrobe();
      randomRegretAlert();
      fakeVirusWarning();
      
      document.body.style.filter = 'invert(1) brightness(1.5)';
      setTimeout(() => {
        document.body.style.filter = '';
      }, 800);
      
      alert("nice try. it only got worse.");
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Shift') {
        document.body.addEventListener('click', instantChaos, { once: true });
      }
    });
    
    function instantChaos() {
      pressCount += 15;
      updateCounter();
      triggerShake(5);
      spawnParticles(200);
      colorStrobe();
      randomRegretAlert();
      fakeVirusWarning();
    }

    console.log('%cdepressinator loaded. good luck on mobile.', 'color:#ff0000; font-family:monospace');
  </script>
</body>
</html>
