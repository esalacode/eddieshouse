<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  >
  <title>the depressinator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root {
      --app-height: 100dvh;
    }

    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: manipulation;
    }

    body {
      margin: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
      color: #dc2626;
      font-family: 'Press Start 2P', system-ui;
      overscroll-behavior: none;
      position: fixed;
      inset: 0;
    }

    .app-shell {
      position: fixed;
      inset: 0;
      width: 100%;
      height: var(--app-height);
      min-height: var(--app-height);
      display: grid;
      place-items: center;
      overflow: hidden;
      padding:
        calc(env(safe-area-inset-top) + 16px)
        calc(env(safe-area-inset-right) + 16px)
        calc(env(safe-area-inset-bottom) + 16px)
        calc(env(safe-area-inset-left) + 16px);
    }

    .content-wrap {
      width: min(100%, 68rem);
      text-align: center;
      position: relative;
    }

    .title-text {
      font-size: clamp(0.88rem, 4.2vw, 2.8rem);
      line-height: 1;
      margin-bottom: clamp(1rem, 4vh, 2rem);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .button-row {
      display: flex;
      justify-content: center;
      margin-bottom: clamp(1rem, 5vh, 2.5rem);
    }

    #doNotPressBtn {
      width: min(100%, 30rem);
      max-width: 100%;
      min-height: clamp(6.5rem, 24vw, 12rem);
      padding: clamp(1.1rem, 4vw, 2.8rem) clamp(1.2rem, 5vw, 3.8rem);
      font-size: clamp(1.5rem, 7vw, 4.25rem);
      line-height: 1.05;
      white-space: normal;
      word-break: break-word;
      touch-action: manipulation;
    }

    #counter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      max-width: 100%;
      min-width: min(100%, 16rem);
      margin: 0 auto;
      padding: clamp(0.8rem, 3vw, 1rem) clamp(1rem, 4vw, 2rem);
      font-size: clamp(1.05rem, 4.4vw, 2rem);
      line-height: 1.2;
      text-align: center;
    }

    .reset-link {
      display: inline-flex;
      margin-top: clamp(1rem, 4vh, 2rem);
      padding: 0.9rem 1.2rem;
      font-size: clamp(0.7rem, 2.5vw, 0.9rem);
      line-height: 1.4;
      touch-action: manipulation;
    }

    .bottom-hint {
      margin-top: clamp(1rem, 4vh, 2rem);
      font-size: clamp(0.45rem, 1.8vw, 0.625rem);
      line-height: 1.4;
      color: rgb(127 29 29 / 0.5);
      letter-spacing: 0.18em;
      pointer-events: none;
    }

    .glitch {
      animation: glitch 0.3s infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 3px 3px #ff0000, -3px -3px #00ffff; }
      25% { text-shadow: -3px 3px #ff0000, 3px -3px #00ffff; }
      50% { text-shadow: 3px -3px #ff0000, -3px 3px #00ffff; }
      100% { text-shadow: 3px 3px #ff0000, -3px -3px #00ffff; }
    }

    .shake {
      animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
    }

    @keyframes shake {
      10%, 90% { transform: translate3d(-4px, 0, 0); }
      20%, 80% { transform: translate3d(4px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
      40%, 60% { transform: translate3d(8px, 0, 0); }
    }

    .particle {
      position: absolute;
      pointer-events: none;
      font-size: 2.5rem;
      z-index: 9999;
    }

    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
    }

    @media (max-width: 420px) {
      .title-text {
        font-size: 0.82rem;
        letter-spacing: 0.02em;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="content-wrap max-w-4xl mx-auto">
      <h1 class="title-text glitch">the depressinator</h1>

      <div class="button-row">
        <button
          onclick="pressTheButton()"
          id="doNotPressBtn"
          class="font-bold border-8 border-red-600 bg-black hover:bg-red-600 hover:text-black active:scale-95 transition-all shadow-[0_0_80px_-10px] shadow-red-600 rounded-3xl"
        >
          do not press
        </button>
      </div>

      <div class="mb-4">
        <div id="counter" class="bg-gray-950 border-4 border-red-600 font-bold">
          <span id="pressCount" class="text-white tabular-nums">0</span>
        </div>
      </div>

      <div
        onclick="fakeReset()"
        class="reset-link border border-red-900 hover:border-red-500 text-red-400 hover:text-red-300 cursor-pointer transition-colors select-none"
      >
        reset
      </div>

      <div class="bottom-hint">
        the more you press the worse it gets
      </div>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    let pressCount = 0;
    let chaosLevel = 0;
    let lastTouchEnd = 0;

    const counterEl = document.getElementById('pressCount');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const regretEmojis = ['💀', '😭', '🪦', '🥲', '🔥', '💥', '🌀', '🚨', '🤡', '⛔'];

    const generalAlerts = [
      'You were explicitly instructed not to do that.',
      'That was an unnecessary decision.',
      'This action has worsened the current state.',
      'Your judgment is now in question.',
      'You have made the situation materially worse.',
      'This outcome is the direct result of your input.',
      'Further misuse is being actively discouraged.',
      'You were given a clear instruction and ignored it.',
      'This is what happens when directions are not followed.',
      'Responsibility for this deterioration sits with you.'
    ];

    const warningAlerts = [
      'Formal warning: your repeated actions are causing avoidable damage.',
      'Formal warning: continued interaction shows poor compliance with instructions.',
      'Formal warning: you have continued despite clear notice not to proceed.',
      'Formal warning: this environment is degrading due to your conduct.',
      'Formal warning: your actions are inconsistent with the stated guidance.'
    ];

    const resetAlerts = [
      'Reset denied. You do not get to undo the consequences after ignoring the instruction.'
    ];

    function getViewportSize() {
      if (window.visualViewport) {
        return {
          width: Math.round(window.visualViewport.width),
          height: Math.round(window.visualViewport.height)
        };
      }

      return {
        width: window.innerWidth,
        height: window.innerHeight
      };
    }

    function syncViewport() {
      const { width, height } = getViewportSize();
      document.documentElement.style.setProperty('--app-height', `${height}px`);

      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.round(width * dpr);
      canvas.height = Math.round(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function pickRandom(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    syncViewport();
    window.addEventListener('resize', syncViewport);
    window.addEventListener('orientationchange', syncViewport);

    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', syncViewport);
      window.visualViewport.addEventListener('scroll', syncViewport);
    }

    document.addEventListener('dblclick', (e) => {
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('gesturestart', (e) => {
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('gesturechange', (e) => {
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('gestureend', (e) => {
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchmove', (e) => {
      if (e.touches.length > 1) {
        e.preventDefault();
      }
    }, { passive: false });

    document.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        e.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });

    function updateCounter() {
      counterEl.textContent = pressCount;
      if (pressCount >= 20) {
        counterEl.classList.add('glitch');
        document.body.style.filter = 'invert(1) hue-rotate(180deg)';
      }
    }

    function triggerShake() {
      const duration = 400 + (chaosLevel * 100);
      document.body.classList.add('shake');
      setTimeout(() => document.body.classList.remove('shake'), duration);

      if (chaosLevel > 5) {
        document.body.style.transform = `rotate(${Math.random() * 8 - 4}deg)`;
        setTimeout(() => {
          document.body.style.transform = '';
        }, 300);
      }
    }

    function spawnParticles(count = 60) {
      const { width, height } = getViewportSize();

      for (let i = 0; i < count; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.textContent = regretEmojis[Math.floor(Math.random() * regretEmojis.length)];
        particle.style.left = Math.random() * width + 'px';
        particle.style.top = (height * 0.6) + 'px';
        particle.style.fontSize = (1.5 + Math.random() * 2) + 'rem';
        document.body.appendChild(particle);

        const xDrift = (Math.random() - 0.5) * Math.min(800, width * 1.25);
        const duration = 1800 + Math.random() * 2200;

        particle.animate([
          { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
          { transform: `translate(${xDrift}px, -${height + 400}px) rotate(${Math.random() * 1440}deg)`, opacity: 0 }
        ], {
          duration,
          easing: 'cubic-bezier(0.42, 0, 1, 1)'
        });

        setTimeout(() => particle.remove(), duration);
      }
    }

    function colorStrobe() {
      let hue = 0;
      const interval = setInterval(() => {
        hue = (hue + 45) % 360;
        document.documentElement.style.filter = `hue-rotate(${hue}deg) saturate(2)`;
      }, 60);

      setTimeout(() => {
        clearInterval(interval);
        document.documentElement.style.filter = '';
      }, 1400 + chaosLevel * 300);
    }

    function randomRegretAlert() {
      alert(pickRandom(generalAlerts));
    }

    function fakeVirusWarning() {
      if (pressCount > 12) {
        alert(pickRandom(warningAlerts));
      }
    }

    function vibrate() {
      if ('vibrate' in navigator) {
        if (chaosLevel > 8) {
          navigator.vibrate([180, 60, 180, 60, 180]);
        } else if (chaosLevel > 4) {
          navigator.vibrate([140, 70, 140]);
        } else {
          navigator.vibrate(120);
        }
      }
    }

    function pressTheButton() {
      pressCount++;
      chaosLevel = Math.floor(pressCount / 3);

      updateCounter();
      triggerShake();
      spawnParticles(30 + chaosLevel * 15);
      vibrate();

      if (pressCount % 3 === 0) colorStrobe();
      if (pressCount % 4 === 0) randomRegretAlert();
      if (pressCount % 5 === 0) fakeVirusWarning();

      if (pressCount > 8) {
        const tilt = (pressCount % 2 === 0 ? 6 : -6) + chaosLevel;
        document.body.style.transition = 'transform 0.2s';
        document.body.style.transform = `rotate(${tilt}deg)`;
        setTimeout(() => {
          document.body.style.transition = 'transform 1s';
          document.body.style.transform = '';
        }, 600);
      }

      if (pressCount >= 10) {
        const btn = document.getElementById('doNotPressBtn');
        btn.classList.add('glitch');
        btn.style.borderColor = '#ff00ff';
      }
    }

    function fakeReset() {
      pressCount += Math.floor(Math.random() * 12) + 8;
      chaosLevel += 4;
      updateCounter();
      triggerShake();
      spawnParticles(120);
      colorStrobe();
      randomRegretAlert();
      fakeVirusWarning();

      if ('vibrate' in navigator) navigator.vibrate([200, 100, 200]);

      document.body.style.filter = 'invert(1) brightness(1.5)';
      setTimeout(() => {
        document.body.style.filter = '';
      }, 800);

      alert(pickRandom(resetAlerts));
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Shift') {
        document.body.addEventListener('click', instantChaos, { once: true });
      }
    });

    function instantChaos() {
      pressCount += 15;
      updateCounter();
      triggerShake();
      spawnParticles(200);
      colorStrobe();
      randomRegretAlert();
      fakeVirusWarning();
      if ('vibrate' in navigator) navigator.vibrate([300, 100, 300]);
    }
  </script>
</body>
</html>
