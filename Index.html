<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  >
  <title>the depressinator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
   @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&family=Press+Start+2P&display=swap');

    :root {
      --app-height: 100dvh;
      --ambient-opacity: 0.72;
      --vignette-opacity: 0.28;
    }

    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: manipulation;
    }

    body {
  margin: 0;
  height: 100%;
  width: 100%;
  overflow: hidden;
  background: #000;
  color: #dc2626;
  font-family: 'Pixelify Sans', system-ui;
  overscroll-behavior: none;
  position: fixed;
  inset: 0;
  transition: filter 240ms ease, background 240ms ease;
}
    
   #doNotPressBtn,
#resetLink,
#titleText,
#counter,
#pressCount {
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}

#doNotPressBtn,
#resetLink,
#titleText,
#counter,
#pressCount,
.notice-text {
  font-family: 'Pixelify Sans', system-ui;
  font-synthesis: none;
  text-transform: none;
}

.notice-heading {
  font-family: 'Press Start 2P', system-ui;
}

    #ambience {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle at 50% 48%, rgba(185, 0, 0, 0.42) 0%, rgba(90, 0, 0, 0.2) 22%, rgba(0, 0, 0, 0) 54%),
        radial-gradient(circle at 50% 50%, rgba(255, 0, 0, 0.12) 0%, rgba(0, 0, 0, 0) 65%);
      opacity: var(--ambient-opacity);
      transform: scale(1.06);
      transition: opacity 220ms ease, transform 220ms ease, filter 220ms ease;
    }

    #vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background: radial-gradient(circle at center, rgba(0, 0, 0, 0) 42%, rgba(0, 0, 0, 0.88) 100%);
      opacity: var(--vignette-opacity);
      transition: opacity 220ms ease;
    }

    .app-shell {
      position: fixed;
      inset: 0;
      width: 100%;
      height: var(--app-height);
      min-height: var(--app-height);
      display: grid;
      place-items: center;
      overflow: hidden;
      padding:
        calc(env(safe-area-inset-top) + 16px)
        calc(env(safe-area-inset-right) + 16px)
        calc(env(safe-area-inset-bottom) + 16px)
        calc(env(safe-area-inset-left) + 16px);
      z-index: 5;
    }

    .content-wrap {
      width: min(100%, 68rem);
      text-align: center;
      position: relative;
      will-change: transform, filter;
      transition: transform 180ms ease, filter 180ms ease;
    }

    .title-text {
      display: block;
      width: 100%;
      margin: 0 0 clamp(1rem, 4vh, 2rem);
      font-size: clamp(1.02rem, 5.1vw, 3.4rem);
      line-height: 1;
      letter-spacing: -0.01em;
      white-space: nowrap;
      text-align: center;
      will-change: transform, letter-spacing, filter;
      transition: transform 180ms ease, letter-spacing 180ms ease, filter 180ms ease, opacity 180ms ease;
    }

    .button-row {
      display: flex;
      justify-content: center;
      margin-bottom: clamp(1rem, 5vh, 2.5rem);
      transition: transform 180ms ease;
    }

    #doNotPressBtn {
  width: min(100%, 30rem);
  max-width: 100%;
  min-height: clamp(6.5rem, 24vw, 12rem);
  padding: clamp(1.1rem, 4vw, 2.8rem) clamp(1.2rem, 5vw, 3.8rem);
  font-size: clamp(1.5rem, 7vw, 4.25rem);
  line-height: 1.05;
  white-space: normal;
  word-break: normal;
  overflow-wrap: anywhere;
  hyphens: none;
  text-align: center;
  text-wrap: balance;
  touch-action: manipulation;
  transition:
    transform 160ms ease,
    border-color 160ms ease,
    background 160ms ease,
    color 160ms ease,
    opacity 160ms ease,
    filter 160ms ease;
}

    #counter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      max-width: 100%;
      min-width: min(100%, 16rem);
      margin: 0 auto;
      padding: clamp(0.8rem, 3vw, 1rem) clamp(1rem, 4vw, 2rem);
      font-size: clamp(1.05rem, 4.4vw, 2rem);
      line-height: 1.2;
      text-align: center;
      transition: transform 180ms ease, filter 180ms ease, border-color 180ms ease;
    }

    #pressCount {
      display: inline-block;
      min-width: 1ch;
      transition: transform 160ms ease, opacity 160ms ease;
    }

    #pressCount.word {
      font-size: clamp(0.72rem, 2.8vw, 1.1rem);
      line-height: 1.15;
      color: #fca5a5;
    }

    .reset-link {
      display: inline-flex;
      margin-top: clamp(1rem, 4vh, 2rem);
      padding: 0.9rem 1.2rem;
      font-size: clamp(0.7rem, 2.5vw, 0.9rem);
      line-height: 1.4;
      touch-action: manipulation;
      transition:
        transform 180ms ease,
        opacity 180ms ease,
        border-color 180ms ease,
        color 180ms ease,
        filter 180ms ease;
    }

    .glitch {
      animation: glitch 0.3s infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 3px 3px #ff0000, -3px -3px #00ffff; }
      25% { text-shadow: -3px 3px #ff0000, 3px -3px #00ffff; }
      50% { text-shadow: 3px -3px #ff0000, -3px 3px #00ffff; }
      100% { text-shadow: 3px 3px #ff0000, -3px -3px #00ffff; }
    }

    .shake {
      animation: shake 0.42s cubic-bezier(.36,.07,.19,.97) both;
    }

    @keyframes shake {
      10%, 90% { transform: translate3d(-4px, 0, 0); }
      20%, 80% { transform: translate3d(4px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
      40%, 60% { transform: translate3d(8px, 0, 0); }
    }

    .particle {
      position: absolute;
      pointer-events: none;
      z-index: 9999;
      font-weight: bold;
      color: rgba(255, 60, 60, 0.95);
      text-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
    }

    .notice-overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: start center;
      pointer-events: none;
      z-index: 80;
      padding:
        calc(env(safe-area-inset-top) + 18px)
        18px
        calc(env(safe-area-inset-bottom) + 18px);
      opacity: 0;
      transition: opacity 180ms ease;
    }

    .notice-overlay.active {
      opacity: 1;
    }

    .notice-overlay.blocking {
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.16);
    }

    .notice-card {
      width: min(100%, 38rem);
      background: rgba(4, 4, 4, 0.96);
      border: 3px solid #dc2626;
      color: #fecaca;
      padding: 1rem 1rem 0.9rem;
      box-shadow: 0 0 36px rgba(220, 38, 38, 0.3);
      transform: translateY(-14px) scale(0.98);
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .notice-overlay.active .notice-card {
      transform: translateY(0) scale(1);
    }

    .notice-card[data-mode="warning"] {
      border-color: #ef4444;
      box-shadow: 0 0 42px rgba(239, 68, 68, 0.38);
    }

    .notice-card[data-mode="critical"] {
      border-color: #f43f5e;
      color: #ffe4e6;
      box-shadow: 0 0 48px rgba(244, 63, 94, 0.45);
    }

    .notice-heading {
      display: block;
      margin-bottom: 0.7rem;
      font-size: clamp(0.58rem, 2vw, 0.78rem);
      line-height: 1.35;
      color: #f87171;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .notice-text {
      font-size: clamp(0.62rem, 2.35vw, 0.9rem);
      line-height: 1.5;
    }

    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 40;
    }

    body.phase-2 #ambience {
      opacity: 0.82;
      transform: scale(1.08);
    }

    body.phase-3 #ambience {
      opacity: 0.95;
      filter: saturate(1.1);
    }

    body.phase-4 #ambience {
      opacity: 1;
      filter: saturate(1.2) contrast(1.05);
    }

    body.phase-4 .content-wrap {
      filter: drop-shadow(0 0 12px rgba(220, 38, 38, 0.18));
    }

    body.phase-4 #counter {
      border-color: #f43f5e !important;
    }

    body.phase-5 {
      filter: contrast(1.08) saturate(1.04);
    }

    body.phase-5 #ambience {
      opacity: 1;
      filter: saturate(1.35) contrast(1.1);
      transform: scale(1.12);
    }

    body.phase-5 #vignette {
      opacity: 0.46;
    }

    body.phase-5 #doNotPressBtn {
      border-color: #f43f5e !important;
      filter: drop-shadow(0 0 12px rgba(244, 63, 94, 0.35));
    }

    body.phase-5 .reset-link {
      border-color: #7f1d1d !important;
      color: #f87171 !important;
    }

    @media (max-width: 420px) {
      .title-text {
        font-size: clamp(0.98rem, 5.2vw, 1.24rem);
        letter-spacing: -0.015em;
      }

      .notice-card {
        padding: 0.9rem 0.9rem 0.82rem;
      }
    }
  </style>
</head>
<body>
  <div id="ambience"></div>
  <div id="vignette"></div>

  <div class="app-shell">
    <div id="contentWrap" class="content-wrap max-w-4xl mx-auto">
      <h1 id="titleText" class="title-text glitch">the depressinator</h1>

      <div id="buttonRow" class="button-row">
       <button
  onclick="pressTheButton()"
  id="doNotPressBtn"
  class="border-8 border-red-600 bg-black hover:bg-red-600 hover:text-black active:scale-95 shadow-[0_0_80px_-10px] shadow-red-600 rounded-3xl"
>
  do not press
</button>
      </div>

      <div class="mb-4">
  <div id="counter" class="bg-gray-950 border-4 border-red-600">
    <span id="pressCount" class="text-white tabular-nums">0</span>
  </div>
</div>

      <div
        onclick="fakeReset()"
        id="resetLink"
        class="reset-link border border-red-900 hover:border-red-500 text-red-400 hover:text-red-300 cursor-pointer select-none"
      >
        reset
      </div>
    </div>
  </div>

  <div id="noticeOverlay" class="notice-overlay" aria-live="polite">
    <div id="noticeCard" class="notice-card" data-mode="warning">
      <span id="noticeHeading" class="notice-heading">notice</span>
      <div id="noticeText" class="notice-text"></div>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
   let pressCount = 0;
let chaosLevel = Math.floor(pressCount / 3);
let lastTouchEnd = 0;
let noticeTimer = null;
let counterTimer = null;
let titleTimer = null;
let driftTimer = null;
let delayedPenaltyTimer = null;
let actionLocked = false;

    const titleEl = document.getElementById('titleText');
    const contentWrap = document.getElementById('contentWrap');
    const buttonRow = document.getElementById('buttonRow');
    const btn = document.getElementById('doNotPressBtn');
    const counterWrap = document.getElementById('counter');
    const counterEl = document.getElementById('pressCount');
    const resetLink = document.getElementById('resetLink');
    const noticeOverlay = document.getElementById('noticeOverlay');
    const noticeCard = document.getElementById('noticeCard');
    const noticeHeading = document.getElementById('noticeHeading');
    const noticeText = document.getElementById('noticeText');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const particleGlyphs = ['×', '!', '■', '▲', '✕', '⊘', '▣', '▢', '✦', '⚠'];
    const counterWords = ['logged', 'fault', 'noted', 'denied', 'ignored', 'avoidable', 'recorded'];

    const stageMessages = {
  1: [
    'you were explicitly instructed not to do that',
    'that was an unnecessary decision',
    'this action has worsened the current state',
    'you were given one clear instruction'
  ],
  2: [
    'repeated non-compliance has now been observed',
    'further user input is not improving conditions',
    'this outcome is the direct result of your input',
    'your continued participation is not assisting remediation'
  ],
  3: [
    'operational state has materially deteriorated due to your conduct',
    'instruction ignored, liability remains with the user',
    'this was preventable, you proceeded anyway',
    'corrective options are narrowing because you did not stop'
  ],
  4: [
    'excessive non-compliance has been logged',
    'manual recovery is becoming less likely',
    'the interface is no longer obligated to behave helpfully',
    'your repeated actions are causing avoidable damage'
  ],
  5: [
    'administrative note: consequences are now persistent',
    'recovery privileges are no longer presumed',
    'the environment is degrading in direct response to you',
    'further misuse is being recorded for continuity'
  ]
};

    const milestoneMessages = {
  6: 'status update: repeated misuse has begun to alter system behaviour',
  12: 'formal warning: the interface has started adapting against the user',
  20: 'escalation notice: adverse effects may now be delayed, cumulative, or deceptive',
  35: 'critical notice: consequences now persist across refresh and reopening'
};

   const resetMessages = {
  mild: 'reset request submitted for review',
  severe: 'reset denied, additional liability has been assigned'
};

   const delayedMessages = [
  'deferred impact applied',
  'additional deterioration has been processed',
  'a delayed penalty has now been entered',
  'further liability has been appended to the session'
];

    

    function getPhase(count = Math.abs(pressCount)) {
  if (count < 6) return 1;
  if (count < 12) return 2;
  if (count < 20) return 3;
  if (count < 35) return 4;
  return 5;
}

    function getViewportSize() {
      if (window.visualViewport) {
        return {
          width: Math.round(window.visualViewport.width),
          height: Math.round(window.visualViewport.height)
        };
      }

      return {
        width: window.innerWidth,
        height: window.innerHeight
      };
    }

    function syncViewport() {
      const { width, height } = getViewportSize();
      document.documentElement.style.setProperty('--app-height', `${height}px`);

      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.round(width * dpr);
      canvas.height = Math.round(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function pickRandom(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function showNotice(message, mode = 'warning', duration = 1700, blocking = false, heading = 'notice') {
  clearTimeout(noticeTimer);
  noticeCard.setAttribute('data-mode', mode);
  noticeHeading.textContent = String(heading).toLowerCase();
  noticeText.textContent = String(message).replace(/\.+$/, '').replace(/^([A-Z])/, (m) => m.toLowerCase());
  noticeOverlay.classList.add('active');
  noticeOverlay.classList.toggle('blocking', blocking);

  noticeTimer = setTimeout(() => {
    noticeOverlay.classList.remove('active', 'blocking');
  }, duration);
}

    function flashCounterWord(word, duration = 650, animate = false) {
  clearTimeout(counterTimer);
  counterEl.classList.add('word');
  counterEl.classList.toggle('glitch', animate);
  counterEl.textContent = word;

  counterTimer = setTimeout(() => {
    counterEl.classList.remove('word', 'glitch');
    counterEl.textContent = String(pressCount);
  }, duration);
}

    function distortTitle(duration = 320) {
      clearTimeout(titleTimer);
      const phase = getPhase();
      const x = (Math.random() - 0.5) * (phase * 2.2);
      const y = (Math.random() - 0.5) * (phase * 1.2);
      const skew = (Math.random() - 0.5) * (phase * 0.9);
      const scale = 1 + (phase * 0.01);

      titleEl.style.transform = `translate(${x}px, ${y}px) skewX(${skew}deg) scale(${scale})`;
      titleEl.style.letterSpacing = `${-0.01 - (phase * 0.005)}em`;
      titleEl.style.filter = phase >= 4 ? 'blur(0.2px) saturate(1.15)' : '';

      titleTimer = setTimeout(() => {
        titleEl.style.transform = '';
        titleEl.style.letterSpacing = '';
        titleEl.style.filter = '';
      }, duration);
    }

    function applyInterfaceDrift() {
      clearTimeout(driftTimer);
      const phase = getPhase();

      if (phase < 3) {
        contentWrap.style.transform = '';
        buttonRow.style.transform = '';
        resetLink.style.transform = '';
        counterWrap.style.transform = '';
        return;
      }

      const mainX = (Math.random() - 0.5) * phase * 2.8;
      const mainY = (Math.random() - 0.5) * phase * 1.4;
      const skew = (Math.random() - 0.5) * phase * 0.55;
      const btnX = (Math.random() - 0.5) * phase * 1.6;
      const resetX = (Math.random() - 0.5) * phase * 5.5;
      const resetY = (Math.random() - 0.5) * phase * 1.2;
      const counterX = (Math.random() - 0.5) * phase * 1.8;

      contentWrap.style.transform = `translate(${mainX}px, ${mainY}px) skewX(${skew}deg)`;
      buttonRow.style.transform = `translateX(${btnX}px)`;
      resetLink.style.transform = `translate(${resetX}px, ${resetY}px)`;
      counterWrap.style.transform = `translateX(${counterX}px)`;

      driftTimer = setTimeout(() => {
        contentWrap.style.transform = '';
        buttonRow.style.transform = '';
        resetLink.style.transform = '';
        counterWrap.style.transform = '';
      }, 260 + (phase * 45));
    }

    function syncPrimaryLabel() {
  if (actionLocked) return;
  btn.textContent = 'do not press';
}

    function updatePhaseClasses() {
      const phase = getPhase();
      document.body.classList.remove('phase-1', 'phase-2', 'phase-3', 'phase-4', 'phase-5');
      document.body.classList.add(`phase-${phase}`);

      if (phase === 1) {
        document.documentElement.style.setProperty('--ambient-opacity', '0.72');
        document.documentElement.style.setProperty('--vignette-opacity', '0.28');
        btn.style.borderColor = '#dc2626';
      } else if (phase === 2) {
        document.documentElement.style.setProperty('--ambient-opacity', '0.82');
        document.documentElement.style.setProperty('--vignette-opacity', '0.33');
        btn.style.borderColor = '#ef4444';
      } else if (phase === 3) {
        document.documentElement.style.setProperty('--ambient-opacity', '0.92');
        document.documentElement.style.setProperty('--vignette-opacity', '0.36');
        btn.style.borderColor = '#ef4444';
      } else if (phase === 4) {
        document.documentElement.style.setProperty('--ambient-opacity', '1');
        document.documentElement.style.setProperty('--vignette-opacity', '0.4');
        btn.style.borderColor = '#f43f5e';
      } else {
        document.documentElement.style.setProperty('--ambient-opacity', '1');
        document.documentElement.style.setProperty('--vignette-opacity', '0.46');
        btn.style.borderColor = '#f43f5e';
      }
    }

    function updateCounter(forceReal = true) {
  if (forceReal) {
    clearTimeout(counterTimer);
    counterEl.classList.remove('word', 'glitch');
    counterEl.textContent = String(pressCount);
  }
}

   function renderState() {
  chaosLevel = Math.floor(Math.abs(pressCount) / 3);
  updateCounter(true);
  updatePhaseClasses();
  syncPrimaryLabel();
}

    function triggerShake() {
      const duration = 320 + (Math.min(getPhase(), 5) * 80);
      document.body.classList.add('shake');
      setTimeout(() => document.body.classList.remove('shake'), duration);
    }

    function spawnParticles(count = 18) {
      const { width, height } = getViewportSize();

      for (let i = 0; i < count; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.textContent = pickRandom(particleGlyphs);
        particle.style.left = `${Math.random() * width}px`;
        particle.style.top = `${height * 0.58}px`;
        particle.style.fontSize = `${1 + Math.random() * 1.3}rem`;
        document.body.appendChild(particle);

        const xDrift = (Math.random() - 0.5) * Math.min(700, width * 1.05);
        const yDrift = height * (0.55 + Math.random() * 0.4);
        const duration = 900 + Math.random() * 1300;

        particle.animate([
          { transform: 'translate(0, 0) rotate(0deg)', opacity: 0.95 },
          { transform: `translate(${xDrift}px, -${yDrift}px) rotate(${Math.random() * 720}deg)`, opacity: 0 }
        ], {
          duration,
          easing: 'cubic-bezier(0.42, 0, 1, 1)'
        });

        setTimeout(() => particle.remove(), duration);
      }
    }

    function colorStrobe(duration = 900, step = 60) {
      let hue = 0;
      const interval = setInterval(() => {
        hue = (hue + 40) % 360;
        document.documentElement.style.filter = `hue-rotate(${hue}deg) saturate(1.8)`;
      }, step);

      setTimeout(() => {
        clearInterval(interval);
        document.documentElement.style.filter = '';
      }, duration);
    }

    function vibratePattern(level = 1) {
      if (!('vibrate' in navigator)) return;

      if (level >= 5) {
        navigator.vibrate([180, 70, 180, 70, 240]);
      } else if (level >= 4) {
        navigator.vibrate([140, 60, 140, 60, 140]);
      } else if (level >= 3) {
        navigator.vibrate([120, 60, 120]);
      } else {
        navigator.vibrate(100);
      }
    }

    function maybeMilestoneNotice(previousCount) {
  const milestones = [6, 12, 20, 35];
  const currentCount = Math.abs(pressCount);
  const crossed = milestones.find((m) => previousCount < m && currentCount >= m);

  if (!crossed) return;

  const mode = crossed >= 20 ? 'critical' : 'warning';
  const heading = crossed >= 20 ? 'escalation' : 'status';
  showNotice(milestoneMessages[crossed], mode, 2600, true, heading);
}

    function maybeCounterCorruption() {
      const phase = getPhase();

      if (phase < 3) return;

      const chance = phase === 3 ? 0.34 : phase === 4 ? 0.46 : 0.58;

      if (Math.random() < chance) {
        flashCounterWord(pickRandom(counterWords), 420 + (phase * 80));
      }
    }

    function maybeDelayedPenalty() {
  const phase = getPhase();

  if (phase < 4 || delayedPenaltyTimer) return;

  const chance = phase === 4 ? 0.24 : 0.38;

  if (Math.random() >= chance) return;

  const delay = randInt(650, 1450);
  delayedPenaltyTimer = setTimeout(() => {
    const extra = phase === 4 ? randInt(1, 3) : randInt(2, 4);
    pressCount -= extra;
    renderState();
    flashCounterWord(`-${extra}`, 700, true);
    spawnParticles(10 + (extra * 6));
    distortTitle(420);
    applyInterfaceDrift();
    vibratePattern(phase);
    showNotice(`${pickRandom(delayedMessages)} -${extra}`, phase === 5 ? 'critical' : 'warning', 1800, false, 'deferred');
    delayedPenaltyTimer = null;
  }, delay);
}

    function maybeLockInput() {
      const phase = getPhase();

      if (phase < 4 || actionLocked) return;

      const chance = phase === 4 ? 0.16 : 0.24;
      if (Math.random() >= chance) return;

      actionLocked = true;
      btn.disabled = true;
      btn.style.opacity = '0.78';
      btn.textContent = 'processing';

      setTimeout(() => {
        actionLocked = false;
        btn.disabled = false;
        btn.style.opacity = '';
        syncPrimaryLabel();
      }, randInt(450, 900));
    }

    function maybeNotice() {
      const phase = getPhase();
      const chance = phase === 1 ? 0.18 : phase === 2 ? 0.28 : phase === 3 ? 0.35 : phase === 4 ? 0.42 : 0.5;

      if (Math.random() < chance) {
        const mode = phase >= 5 ? 'critical' : phase >= 3 ? 'warning' : 'warning';
        const heading = phase >= 4 ? 'warning' : 'notice';
        showNotice(pickRandom(stageMessages[phase]), mode, 1700 + (phase * 120), false, heading);
      }
    }

    function performEscalation(incrementApplied = 1) {
      const phase = getPhase();

      updateCounter(true);
      triggerShake();
      distortTitle(260 + (phase * 40));
      applyInterfaceDrift();
      spawnParticles(Math.min(14 + (phase * 6) + (incrementApplied * 3), 52));
      vibratePattern(phase);

      if (phase >= 3 && Math.random() < 0.32) {
        colorStrobe(phase >= 5 ? 1200 : 850 + (phase * 120), phase >= 5 ? 42 : 56);
      }

      if (phase >= 4) {
        const tilt = (pressCount % 2 === 0 ? 1 : -1) * randInt(2, 5);
        document.body.style.transition = 'transform 120ms ease';
        document.body.style.transform = `rotate(${tilt}deg)`;
        setTimeout(() => {
          document.body.style.transition = 'transform 520ms ease';
          document.body.style.transform = '';
        }, 160);
      }
    }

    function pressTheButton() {
  if (actionLocked) {
    showNotice('input is temporarily unavailable due to prior misuse', 'warning', 1300, false, 'notice');
    return;
  }

  const previousCount = Math.abs(pressCount);
  const phaseBefore = getPhase(previousCount);

  let penalty = 1;

  if (phaseBefore >= 4 && Math.random() < 0.18) penalty += 1;
  if (phaseBefore >= 5 && Math.random() < 0.12) penalty += 2;

  pressCount -= penalty;
  renderState();
  performEscalation(penalty);
  maybeMilestoneNotice(previousCount);
  maybeCounterCorruption();
  maybeNotice();
  maybeDelayedPenalty();
  maybeLockInput();
}

    function fakeReset() {
  if (actionLocked) {
    showNotice('a prior action is still being processed', 'warning', 1200, false, 'notice');
    return;
  }

  actionLocked = true;
  resetLink.style.pointerEvents = 'none';
  resetLink.textContent = 'reviewing';
  btn.disabled = true;
  btn.style.opacity = '0.8';

  showNotice(resetMessages.mild, 'warning', 1200, true, 'request');

  setTimeout(() => {
    const phase = getPhase();
    const penalty = phase >= 5 ? randInt(14, 24) : phase >= 4 ? randInt(10, 18) : randInt(6, 12);

    pressCount -= penalty;
    renderState();
    performEscalation(penalty > 1 ? 2 : 1);
    flashCounterWord(`-${penalty}`, 900, true);
    colorStrobe(phase >= 4 ? 1500 : 1100, phase >= 4 ? 44 : 58);
    showNotice(`${resetMessages.severe} -${penalty}`, 'critical', 2500, true, 'denied');

    resetLink.textContent = 'reset';
    resetLink.style.pointerEvents = '';
    btn.disabled = false;
    btn.style.opacity = '';
    actionLocked = false;
  }, randInt(850, 1250));
}

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Shift') {
        pressTheButton();
      }
    });

    document.addEventListener('dblclick', (e) => {
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('gesturestart', (e) => {
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('gesturechange', (e) => {
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('gestureend', (e) => {
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchmove', (e) => {
      if (e.touches.length > 1) {
        e.preventDefault();
      }
    }, { passive: false });

    document.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        e.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });

    syncViewport();
    renderState();

    window.addEventListener('resize', syncViewport);
    window.addEventListener('orientationchange', syncViewport);

    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', syncViewport);
      window.visualViewport.addEventListener('scroll', syncViewport);
    }

    
  </script>
</body>
</html>
